name: Daily Redash Sync

on:
  schedule:
    - cron: '30 23 * * 0-4'  # 매일 평일 08:30 KST (= 전날 23:30 UTC). GitHub Actions 지연 2h 버퍼 → 11시 데드라인 안정
  workflow_dispatch:         # 수동 테스트용

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 인증 파일 복원
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json
          echo '${{ secrets.BQ_TOKEN }}' > bq_token.json

      - name: sync.py 실행
        run: python3 -u sync.py

      - name: monthly_sync.py 실행 (월별 CM 신호 탭)
        run: python3 -u monthly_sync.py

      - name: 완료 알림 이메일
        if: always()
        run: |
          python3 - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText

          status = os.environ.get('STATUS', 'unknown')
          emoji = '✅' if status == 'success' else '❌'
          msg = MIMEText(f'{emoji} Redash 동기화 {status}\n\n자동 실행 완료되었습니다.', 'plain', 'utf-8')
          msg['Subject'] = f'[Redash Sync] 동기화 {emoji}'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['WORK_EMAIL']

          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
              smtp.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              smtp.send_message(msg)
          EOF
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          WORK_EMAIL: ${{ secrets.WORK_EMAIL }}
          STATUS: ${{ job.status }}
